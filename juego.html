<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Buscaminas - Revelar al clic</title>
  <style>
        body {
      font-family: Arial, sans-serif;
      background: #111;
      color: #eee;
      text-align: center;
      margin: 0;
      padding: 20px;
    }
    h1 { margin: 10px; }
    #controls { margin: 20px; }
    #board {
      display: grid;
      gap: 4px;
      margin: 20px auto;
      width: fit-content;
      background: #222;
      padding: 10px;
      border-radius: 8px;
    }
    .button {
      background-color: #0a0;
    }
    .cell {
      width: 50px;
      height: 50px;
      background: #555;
      border: 3px solid #777;
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 26px;
      font-weight: bold;
      cursor: pointer;
      user-select: none;
    }
    .cell.revealed {
      background: #aaa;
      cursor: default;
    }
    .cell.mine { background: #c33; color: white; }
    .cell.empty { background: #888; }
    .cell.num-1 { color: #44f; }
    .cell.num-2 { color: #0a0; }
    .cell.num-3 { color: #f80; }
    button, select {
      font-size: 18px;
      padding: 10px 16px;
      margin: 6px;
    }
  </style>
</head>
<body>

  <h1>Buscaminas</h1>
  <h4>
    <em>
      Puedes ajustar el tamaño y dificultad del tablero
    </em>
  </h4>
  <br>
  <button class="button">
    <a href="index.html">Voler al inicio</a>
  </button>
  <div id="controls">
    <select id="size">
      <option value="2">2 × 2</option>
      <option value="4" selected>4 × 4</option>
      <option value="5">5 × 5</option>
      <option value="6">6 × 6</option>
    </select>
    <button onclick="startNewGame()">Nueva partida</button>
  </div>

  <div id="board"></div>

  <script>
    let board = [];           // contiene los valores reales ('M', 1, 2, 3, '')
    let revealed = [];        // qué casillas ya se revelaron
    let N = 4;

    function startNewGame() {
      N = parseInt(document.getElementById('size').value);

      // Crear tableros
      board = Array(N).fill().map(() => Array(N).fill(0));
      revealed = Array(N).fill().map(() => Array(N).fill(false));

      // Cantidad de minas según tamaño (ajustable)
      let mineCount;
      if      (N === 2) mineCount = 1;
      else if (N === 4) mineCount = Math.floor(N*N * 0.18) || 3;  // ~18%
      else if (N === 5) mineCount = Math.floor(N*N * 0.16) || 4;
      else              mineCount = Math.floor(N*N * 0.15) || 6;

      // Colocar minas
      let placed = 0;
      while (placed < mineCount) {
        let r = Math.floor(Math.random() * N);
        let c = Math.floor(Math.random() * N);
        if (board[r][c] !== 'M') {
          board[r][c] = 'M';
          placed++;
        }
      }

      // Calcular números (máximo 3 como pediste)
      for (let i = 0; i < N; i++) {
        for (let j = 0; j < N; j++) {
          if (board[i][j] === 'M') continue;
          let count = 0;
          for (let di = -1; di <= 1; di++) {
            for (let dj = -1; dj <= 1; dj++) {
              if (di === 0 && dj === 0) continue;
              let ni = i + di, nj = j + dj;
              if (ni >= 0 && ni < N && nj >= 0 && nj < N && board[ni][nj] === 'M') {
                count++;
              }
            }
          }
          board[i][j] = (count === 0) ? '' : Math.min(count, 3);
        }
      }

      renderBoard();
    }

    function renderBoard() {
      const container = document.getElementById('board');
      container.style.gridTemplateColumns = `repeat(${N}, 50px)`;
      container.innerHTML = '';

      for (let i = 0; i < N; i++) {
        for (let j = 0; j < N; j++) {
          const cell = document.createElement('div');
          cell.classList.add('cell');

          if (revealed[i][j]) {
            cell.classList.add('revealed');
            const val = board[i][j];
            if (val === 'M') {
              cell.textContent = '@';
              cell.classList.add('mine');
            } else if (val === '') {
              cell.textContent = '';
              cell.classList.add('empty');
            } else {
              cell.textContent = val;
              cell.classList.add(`num-${val}`);
            }
          } else {
            cell.textContent = '？';   // o puedes usar '--?--'
            // cell.textContent = '--?--';
          }

          cell.addEventListener('click', () => {
            if (!revealed[i][j]) {
              revealCell(i, j);
            }
          });

          container.appendChild(cell);
        }
      }
    }

    function revealCell(row, col) {
      if (revealed[row][col]) return;
      revealed[row][col] = true;

      if (board[row][col] === 'M') {
        // Perdiste → mostrar todas las minas (opcional)
        alert("¡Perdiste! 💥");
        showAllMines();
      } else if (board[row][col] === '') {
        // Revelar recursivamente los vacíos (flood fill) → opcional
        // Si no quieres flood fill, quita las siguientes 10 líneas
        for (let di = -1; di <= 1; di++) {
          for (let dj = -1; dj <= 1; dj++) {
            if (di === 0 && dj === 0) continue;
            let ni = row + di, nj = col + dj;
            if (ni >= 0 && ni < N && nj >= 0 && nj < N && !revealed[ni][nj]) {
              revealCell(ni, nj);
            }
          }
        }
      }

      renderBoard();

      // Verificar si ganaste (todas las no-minas reveladas)
      checkWin();
    }

    function showAllMines() {
      for (let i = 0; i < N; i++) {
        for (let j = 0; j < N; j++) {
          if (board[i][j] === 'M') {
            revealed[i][j] = true;
          }
        }
      }
      renderBoard();
    }

    function checkWin() {
      let unrevealedNonMines = 0;
      for (let i = 0; i < N; i++) {
        for (let j = 0; j < N; j++) {
          if (!revealed[i][j] && board[i][j] !== 'M') {
            unrevealedNonMines++;
          }
        }
      }
      if (unrevealedNonMines === 0) {
        alert("¡Ganaste! 🎉");
      }
    }

    // Iniciar la primera partida al cargar
    window.onload = startNewGame;
  </script>
</body>
</html>
